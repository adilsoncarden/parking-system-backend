spring.application.name=api

# Configuración de la Base de Datos (Neon.tech - Actualizado)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.sql.init.schema-locations=classpath:schema-penalizacion.sql

carrito.penalizacion.tiempo-limite-minutos=15
carrito.penalizacion.tarifa-por-minuto=1.00

# Seguridad y CORS
jwt.secret=MiClaveSecretaSuperSeguraYMuyLarga2026_CondoSaaS_Project
jwt.expiration=86400000
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}